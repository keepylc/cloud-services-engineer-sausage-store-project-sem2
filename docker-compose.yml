# Локальная сборка: cp docker-compose.override.yml.dist docker-compose.override.yml && docker compose up -d --build
services:
  frontend:
    image: keepylc/sausage-frontend:latest
    ports:
      - "80:80"
    networks:
      - backend
    depends_on:
      backend:
        condition: service_started
    configs:
      - source: default.conf
        target: /etc/nginx/conf.d/default.conf

  backend:
    image: keepylc/sausage-backend:latest
    expose:
      - "8080"
    networks:
      - backend
    depends_on:
      postgresql:
        condition: service_healthy
      mongodb:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgresql:5432/${SPRING_DATASOURCE_DATABASE}"
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_DATA_MONGODB_URI: "mongodb://${SPRING_DATA_MONGODB_USERNAME}:${SPRING_DATA_MONGODB_PASSWORD}@mongodb:27017/sausage-store"
      SPRING_CLOUD_VAULT_ENABLED: "false"    

  postgresql:
    image: postgres:16
    ports:
      - "5432:5432"
    networks:
      - backend
    environment:
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      POSTGRES_DB: ${SPRING_DATASOURCE_DATABASE}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-U", "${SPRING_DATASOURCE_USERNAME}", "-d", "${SPRING_DATASOURCE_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-report:
    image: keepylc/sausage-backend-report:latest
    environment:
      - PORT=8080
      - DB=mongodb://${SPRING_DATA_MONGODB_USERNAME}:${SPRING_DATA_MONGODB_PASSWORD}@mongodb:27017/sausage-store
    expose:
      - "8080"
    networks:
      - backend

  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    networks:
      - backend
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${SPRING_DATA_MONGODB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${SPRING_DATA_MONGODB_PASSWORD}

networks:
  backend:

configs:
  default.conf:
    file: docker-compose.default.conf